services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/data
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - rag_data:/data

volumes:
  rag_data:
