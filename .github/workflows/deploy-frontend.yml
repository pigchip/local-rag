name: Deploy frontend to GitHub Pages

# Builds the Vite SPA and publishes it to the aguzmancruz.github.io Pages repo
# under /local-rag, so it is served at https://aguzmancruz.com/local-rag.
#
# One-time setup (see deploy/azure/DEPLOY.md):
#   - Secret  PAGES_DEPLOY_TOKEN : a PAT with Contents:write on
#                                  aguzmancruz/aguzmancruz.github.io
#   - Variable VITE_API_BASE_URL  (optional): backend URL, defaults below.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        env:
          # Served under the /local-rag subpath on GitHub Pages.
          BASE_PATH: /local-rag/
          # Backend API origin (no trailing slash). Override via repo variable.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.aguzmancruz.com' }}
        run: npm run build

      - name: Add SPA fallback (client-side routing on GitHub Pages)
        run: cp dist/index.html dist/404.html

      - name: Publish to aguzmancruz.github.io/local-rag
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: aguzmancruz/aguzmancruz.github.io
          publish_branch: main
          publish_dir: frontend/dist
          destination_dir: local-rag
          keep_files: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy local-rag frontend ${{ github.sha }}"
